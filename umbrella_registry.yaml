# umbrella_registry.yaml
# Maps umbrella project slugs to their component sub-projects.
# Components listed here will be hidden from the top-level project picker
# and captured into the umbrella's vault folder.
#
# Flat projects (components: []) appear as normal projects with no component picker.

ikeos:
  name: IkeOS
  components:
    - obsidian-capture
    - n8n

claude-config:
  name: Claude Config
  components:
    - claude-code

homelab-manager:
  name: Homelab Manager
  components:
    - home-assistant
    - media-stack
    - infrastructure

life-tools:
  name: Life Tools
  components:
    - recipe-binder

music-tools:
  name: Music Tools
  components:
    - spotify-beatport

rcade:
  name: RCADE
  components:
    - microgames-dev

pixitup:
  name: PixItUp
  components:
    - zone-builder

bcr-waivers:
  name: Wayvr
  components: []

frc-dashboard:
  name: PitRadar
  components: []

worldwardle:
  name: Worldwardle
  components: []
