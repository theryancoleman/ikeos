services:
  ikeos:
    build: .
    container_name: ikeos
    restart: unless-stopped
    env_file: .env
    ports:
      - "5009:5009"
    volumes:
      - C:\Server\obsidian-vault:/vault:rw
      - C:\Users\ServerAdmin\.claude\VERSION:/claude-config/VERSION:ro
    networks:
      - traefik_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ikeos.rule=Host(`192.168.1.77`)"
      - "traefik.http.services.ikeos.loadbalancer.server.port=5009"

networks:
  traefik_network:
    external: true
