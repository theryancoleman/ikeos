services:
  ikeos:
    build: .
    container_name: ikeos
    restart: unless-stopped
    env_file: .env
    environment:
      - VAULT_PATH=/vault
      - METRICS_PATH=/metrics/events.jsonl
      - AIOS_BLOG_POSTS_DIR=/blog-posts
      - AIOS_BLOG_PROJECT_DIR=${AIOS_BLOG_PROJECT_DIR:-}
      - WEEKLY_REVIEW_OUTPUT_DIR=/weekly-reviews
      - CLAUDE_CONFIG_DIR=${CLAUDE_CONFIG_PATH:+/claude-config}
    ports:
      - "5009:5009"
    volumes:
      - ${VAULT_PATH}:/vault:rw
      - ${METRICS_PATH_HOST:-/tmp/ikeos-metrics}:/metrics:rw
      - ${CLAUDE_VERSION_PATH}:/claude-config/VERSION:ro
      - ${CLAUDE_CONFIG_PATH:-/tmp/ikeos-no-claude-config}/library:/claude-config/library:ro
      - ${AIOS_BLOG_POSTS_PATH}:/blog-posts:rw
      - ${WEEKLY_REVIEW_OUTPUT_PATH:-/tmp/ikeos-no-weekly-reviews}:/weekly-reviews:ro
