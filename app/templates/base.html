<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ʻIkeOS{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo-ikeos-appicon-dark.png') }}">
</head>
<body>
  <nav>
    <a href="{{ url_for('agents.home') }}" class="nav-brand">
      <img src="{{ url_for('static', filename='logo-ikeos-mark.png') }}" alt="ʻIkeOS mark">
      <span class="nav-brand-text">ʻIkeOS</span>
    </a>
    <a href="{{ url_for('agents.home') }}"   class="nav-link">Home</a>
    <a href="{{ url_for('browse.tasks') }}"  class="nav-link">Tasks</a>
    <a href="{{ url_for('agents.agents') }}" class="nav-link">Sessions</a>
    <a href="{{ url_for('capture.capture_form') }}" class="nav-link">Capture</a>
    {% if config_version %}<span class="nav-version">{{ config_version }}</span>{% endif %}
  </nav>

  <main>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>
</body>
</html>
