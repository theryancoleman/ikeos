<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Capture{% endblock %} — Obsidian Capture</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav>
    <a href="{{ url_for('browse.dashboard') }}" class="nav-brand">Capture</a>
    <a href="{{ url_for('capture.capture_form') }}" class="nav-link">+ New entry</a>
    <a href="{{ url_for('agents.agents') }}" class="nav-link">Agents</a>
  </nav>

  <main>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>
</body>
</html>
