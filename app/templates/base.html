<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ʻIkeOS{% endblock %} — ʻIkeOS</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo-ikeos-okina.png') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='img/logo-ikeos-appicon-dark.png') }}">
</head>
<body>
  <nav class="ike-nav">
    <a href="{{ url_for('agents.dashboard') }}" class="nav-brand" aria-label="ʻIkeOS home">
      <img src="{{ url_for('static', filename='img/logo-ikeos-okina.png') }}"
           alt="" class="nav-mark" width="24" height="24">
      <span class="nav-wordmark"><span class="okina">ʻ</span>IkeOS</span>
    </a>
    <button class="nav-hamburger" aria-label="Toggle navigation" aria-controls="nav-links-menu" aria-expanded="false"
            onclick="this.setAttribute('aria-expanded', document.querySelector('.ike-nav').classList.toggle('nav-open'));this.textContent = document.querySelector('.ike-nav').classList.contains('nav-open') ? '✕' : '☰'">☰</button>
    <div class="nav-links" id="nav-links-menu">
      <a href="{{ url_for('agents.dashboard') }}" class="nav-link {% if request.endpoint == 'agents.dashboard' %}is-active{% endif %}">Dashboard</a>
      <a href="{{ url_for('browse.tasks') }}"     class="nav-link {% if request.endpoint == 'browse.tasks' %}is-active{% endif %}">Tasks</a>
      <a href="{{ url_for('agents.agents') }}"    class="nav-link {% if request.endpoint == 'agents.agents' %}is-active{% endif %}">Sessions</a>
      <a href="{{ url_for('capture.capture_form') }}" class="nav-link {% if request.endpoint == 'capture.capture_form' %}is-active{% endif %}">Capture</a>
      <a href="{{ url_for('agents.status_page') }}" class="nav-link {% if request.endpoint == 'agents.status_page' %}is-active{% endif %}">Status</a>
      {% if config_version %}<span class="nav-version">{{ config_version }}</span>{% endif %}
    </div>
  </nav>

  <main>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>
</body>
</html>
