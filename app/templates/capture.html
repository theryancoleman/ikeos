{% extends "base.html" %}
{% block title %}New entry{% endblock %}

{% block content %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde@2.18.0/dist/easymde.min.css">
<h1>New entry</h1>

<form method="post" action="{{ url_for('capture.capture_submit') }}">
  <div class="field">
    <label for="project">Project</label>
    <select id="project" name="project" required onchange="updateProject(this.value)">
      {% for p in projects %}
        <option value="{{ p.slug }}" {% if p.slug == selected_project %}selected{% endif %}>{{ p.name }}</option>
      {% endfor %}
      <option value="__future__">— Future project —</option>
    </select>
  </div>

  <div id="future-project-field" class="field hidden">
    <label for="future_project_name">Future project name</label>
    <input id="future_project_name" name="future_project_name" type="text" placeholder="e.g. my-new-app">
  </div>

  <div class="field">
    <label for="type">Type</label>
    <select id="type" name="type" required onchange="updateFields(this.value)">
      <option value="note">Note</option>
      <option value="idea">Idea</option>
      <option value="bug">Bug</option>
    </select>
  </div>

  <div class="field">
    <label for="title">Title</label>
    <input id="title" name="title" type="text" required>
  </div>

  <div class="field">
    <label for="body">Description</label>
    <textarea id="body" name="body" rows="5"></textarea>
  </div>

  <!-- Idea fields -->
  <div id="idea-fields" class="conditional hidden">
    <div class="field">
      <label for="priority">Priority</label>
      <select id="priority" name="priority">
        <option value="low">Low</option>
        <option value="medium" selected>Medium</option>
        <option value="high">High</option>
      </select>
    </div>
    <div class="field">
      <label for="effort">Effort</label>
      <select id="effort" name="effort">
        <option value="small">Small</option>
        <option value="medium" selected>Medium</option>
        <option value="large">Large</option>
      </select>
    </div>
  </div>

  <!-- Bug fields -->
  <div id="bug-fields" class="conditional hidden">
    <div class="field">
      <label for="severity">Severity</label>
      <select id="severity" name="severity">
        <option value="low">Low</option>
        <option value="medium" selected>Medium</option>
        <option value="high">High</option>
        <option value="critical">Critical</option>
      </select>
    </div>
    <div class="field">
      <label for="steps">Steps to reproduce</label>
      <textarea id="steps" name="steps" rows="4"></textarea>
    </div>
  </div>

  <div class="field">
    <label>Domain <span class="field-optional">(optional — select all that apply)</span></label>
    <div class="domain-checkboxes">
      <label class="checkbox-label"><input type="checkbox" name="domains" value="auth"> auth</label>
      <label class="checkbox-label"><input type="checkbox" name="domains" value="payments"> payments</label>
      <label class="checkbox-label"><input type="checkbox" name="domains" value="ui"> ui</label>
      <label class="checkbox-label"><input type="checkbox" name="domains" value="api"> api</label>
      <label class="checkbox-label"><input type="checkbox" name="domains" value="data"> data</label>
      <label class="checkbox-label"><input type="checkbox" name="domains" value="infra"> infra</label>
      <label class="checkbox-label"><input type="checkbox" name="domains" value="data-visualization"> data-visualization</label>
      <label class="checkbox-label"><input type="checkbox" name="domains" value="game-logic"> game-logic</label>
    </div>
  </div>

  <div class="field stay-field">
    <label class="checkbox-label">
      <input type="checkbox" name="stay" value="1"> Stay on this page after saving
    </label>
  </div>

  <button type="submit">Save entry</button>
</form>

<script>
function updateFields(type) {
  document.getElementById('idea-fields').classList.add('hidden');
  document.getElementById('bug-fields').classList.add('hidden');
  if (type === 'idea') document.getElementById('idea-fields').classList.remove('hidden');
  if (type === 'bug') document.getElementById('bug-fields').classList.remove('hidden');
}
function updateProject(value) {
  const field = document.getElementById('future-project-field');
  const input = document.getElementById('future_project_name');
  if (value === '__future__') {
    field.classList.remove('hidden');
    input.required = true;
  } else {
    field.classList.add('hidden');
    input.required = false;
  }
}

(function () {
  const stayBox = document.querySelector('input[name="stay"]');
  if (!stayBox) return;
  if (localStorage.getItem('captureStay') === '1') stayBox.checked = true;
  stayBox.addEventListener('change', function () {
    localStorage.setItem('captureStay', this.checked ? '1' : '0');
  });
})();
</script>

<script src="https://cdn.jsdelivr.net/npm/easymde@2.18.0/dist/easymde.min.js"></script>
<script>
  const easyMDE = new EasyMDE({
    element: document.getElementById("body"),
    spellChecker: false,
    autosave: { enabled: false },
    toolbar: [
      "bold", "italic", "heading", "|",
      "quote", "unordered-list", "ordered-list", "|",
      "link", "code", "|",
      "preview", "side-by-side", "fullscreen"
    ],
    minHeight: "120px",
  });
</script>
{% endblock %}
