{% extends "base.html" %}
{% block title %}Housekeeping{% endblock %}

{% block content %}
<div class="settings-page">
  <header class="page-header">
    <span class="ike-eyebrow">System</span>
    <h1>Housekeeping</h1>
  </header>
  {% if tasks %}
    {% for task in tasks %}
      <p>{{ task.filename }}</p>
    {% endfor %}
  {% else %}
    <p class="empty">No tasks defined yet.</p>
  {% endif %}
</div>
{% endblock %}
